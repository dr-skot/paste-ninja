<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8d8d8"/>
      <stop offset="1" stop-color="#909090"/>
    </linearGradient>
  </defs>

  <!-- Clipboard body -->
  <path d="M 21.6 9
           L 106.4 9
           Q 114.4 9 114.4 17
           L 114.4 116
           Q 114.4 124 106.4 124
           L 21.6 124
           Q 13.6 124 13.6 116
           L 13.6 17
           Q 13.6 9 21.6 9 Z"
        fill="#0a0a0a"/>

  <!-- Face / skin showing through the mask slit (Lego minifig yellow) -->
  <rect x="24.4" y="49" width="79.2" height="30" rx="15" fill="#ffffff"/>

  <!-- Eyes -->
  <ellipse cx="48" cy="64" rx="9" ry="5" fill="#0a0a0a"/>
  <ellipse cx="80" cy="64" rx="9" ry="5" fill="#0a0a0a"/>

  <!-- Silver shape: rounded-top "headband" merged with the dome-shaped pivot circle. -->
  <path d="M 24.4 24
           Q 24.4 14 34.4 14
           L 54 14
           A 10 10 0 0 1 74 14
           L 93.6 14
           Q 103.6 14 103.6 24
           L 103.6 29
           L 24.4 29 Z"
        fill="url(#metal)" stroke="#606060" stroke-width="1.2"/>

  <!-- Black circle on top of the silver dome -->
  <circle cx="64" cy="14" r="3.75" fill="#0a0a0a"/>
</svg>
