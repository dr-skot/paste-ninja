<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- DFWP clipboard, retraced. Single color, no document overlay. -->

  <!-- Clipboard body — generous rounded rectangle, fills most of the canvas. -->
  <rect x="18" y="20" width="92" height="100" rx="10" fill="#5fa8e0"/>

  <!-- Clip — single small pill rising from the top of the board.
       No separate pivot bar; the "bar" portion is implicit, hidden inside
       the board's top edge. The pill is wider than tall, sitting on the top. -->
  <rect x="50" y="4" width="28" height="22" rx="6" fill="#5fa8e0"/>
</svg>
