<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8d8d8"/>
      <stop offset="1" stop-color="#909090"/>
    </linearGradient>
  </defs>

  <!-- Clipboard body — generously rounded, DFWP-style proportions -->
  <rect x="8" y="28" width="112" height="96" rx="10" fill="#0a0a0a"/>

  <!-- Face / skin showing through the mask slit (Lego minifig yellow) -->
  <rect x="20" y="52" width="88" height="30" rx="10" fill="#ffd500"/>

  <!-- Eyes -->
  <ellipse cx="48" cy="67" rx="9" ry="5" fill="#0a0a0a"/>
  <ellipse cx="80" cy="67" rx="9" ry="5" fill="#0a0a0a"/>

  <!-- Silver clip: DFWP-style — slim pivot bar + tall pill lever -->
  <!-- Pivot bar (sits across the top of the board) -->
  <rect x="40" y="22" width="48" height="14" rx="3" fill="url(#metal)" stroke="#606060" stroke-width="1.2"/>
  <!-- Pill lever -->
  <rect x="58" y="4" width="12" height="32" rx="6" fill="url(#metal)" stroke="#606060" stroke-width="1.2"/>
</svg>
