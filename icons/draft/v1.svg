<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8d8d8"/>
      <stop offset="1" stop-color="#909090"/>
    </linearGradient>
  </defs>

  <!-- Clipboard body -->
  <path d="M 16 28
           L 112 28
           Q 120 28 120 36
           L 120 116
           Q 120 124 112 124
           L 16 124
           Q 8 124 8 116
           L 8 36
           Q 8 28 16 28 Z"
        fill="#0a0a0a"/>

  <!-- Face / skin showing through the mask slit (Lego minifig yellow) -->
  <rect x="20" y="56" width="88" height="30" rx="10" fill="#ffd500"/>

  <!-- Eyes -->
  <ellipse cx="48" cy="71" rx="9" ry="5" fill="#0a0a0a"/>
  <ellipse cx="80" cy="71" rx="9" ry="5" fill="#0a0a0a"/>

  <!-- Silver clip: DFWP-style pill-on-bar -->
  <!-- Pivot bar (sits across the top of the board, slim) -->
  <rect x="40" y="28" width="48" height="10" rx="2" fill="url(#metal)" stroke="#606060" stroke-width="1.2"/>
  <!-- Pill lever (tall, fully rounded ends) -->
  <rect x="56" y="2" width="16" height="32" rx="8" fill="url(#metal)" stroke="#606060" stroke-width="1.2"/>
</svg>
